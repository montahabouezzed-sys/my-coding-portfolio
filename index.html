<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | My Coding Lab</title>

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --muted: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            margin-bottom: 60px;
            max-width: 800px;
        }

        .hero h1 {
            font-size: 2.8rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--muted);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1100px;
            width: 100%;
        }

        /* PROJECT CARDS */
        .project-card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: 0.25s ease;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
        }

        .tag {
            background: var(--accent);
            color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .code-box {
            background: #000;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            margin: 15px 0;
            border: 1px solid #334155;
            white-space: pre-wrap;
        }

        .project-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        /* TRAINING MODULES */
        .modules {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #334155;
            max-width: 1100px;
            width: 100%;
        }

        .modules h2 {
            margin-bottom: 10px;
        }

        .modules ul {
            color: var(--muted);
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <!-- HERO -->
    <div class="hero">
        <h1>My Coding Lab</h1>
        <p>A growing collection
