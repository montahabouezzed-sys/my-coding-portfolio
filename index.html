<!DOCTYPE html>
<html>
<head>
    <title>My Dev Journey</title>
    <style>
        /* This is where you practice your CSS */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6; /* Try changing this hex code! */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 250px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px); /* This adds a little 'lift' effect */
        }

        h1 { color: #333; }
        h3 { color: #2c3e50; margin-top: 0; }
    </style>
</head>
<body>

    <h1>Software Development Training</h1>
    <p>Applying concepts I've learned through hands-on practice.</p>

    <div class="container">
        <div class="card">
            <h3>Concept 01</h3>
            <p>Description of a logic or language concept you mastered here.</p>
        </div>

        <div class="card">
            <h3>Concept 02</h3>
            <p>Another training milestone goes here.</p>
        </div>
    </div>

</body>
</html>
